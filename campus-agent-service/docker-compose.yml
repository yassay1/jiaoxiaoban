# Campus Agent Service local development stack
# Start: docker compose up -d
# Stop:  docker compose down

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: campus_agent
      POSTGRES_USER: campus_agent
      POSTGRES_PASSWORD: campus_agent_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_agent -d campus_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - COMMUNITY_SERVICE_MODE=local
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
